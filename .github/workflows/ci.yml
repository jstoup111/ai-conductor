name: ci

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash test/test_harness_integrity.sh

  conductor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: src/conductor/.tool-versions
          cache: npm
          cache-dependency-path: src/conductor/package-lock.json
      - run: npm ci
        working-directory: src/conductor
      - run: npm run build
        working-directory: src/conductor
      # --maxWorkers=2: the suite (4500+ tests) OOM-kills a vitest fork worker
      # on the 7GB runner at full parallelism (observed 2026-07-07: all tests
      # pass, then "Worker exited unexpectedly" with a V8 allocation-failure
      # stack fails the job). Two workers halves peak memory; wall time is not
      # a constraint here.
      - run: npm test -- --minWorkers=1 --maxWorkers=2
        working-directory: src/conductor
