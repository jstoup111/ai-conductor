name: ci

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash test/test_harness_integrity.sh

  conductor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: src/conductor/.tool-versions
          cache: npm
          cache-dependency-path: src/conductor/package-lock.json
      - run: npm ci
        working-directory: src/conductor
      - run: npm run build
        working-directory: src/conductor
      # Suite-scale memory ceiling (2026-07-07): all 4480+ tests pass, then a
      # long-lived fork worker dies at V8's default ~4GB old-space cap
      # ("Worker exited unexpectedly", allocation-failure stack) — per-file
      # memory accumulates in reused workers, and fewer workers concentrate
      # more files per process. Two workers bound machine-level parallelism;
      # the raised old-space cap clears the per-worker ceiling. Wall time is
      # not a constraint here (operator directive).
      - run: npm test -- --minWorkers=1 --maxWorkers=2
        working-directory: src/conductor
        env:
          NODE_OPTIONS: --max-old-space-size=5120
