# ai-conductor project configuration
# See the harness config schema (src/conductor/src/types/config.ts) for all keys.

# Owner-gate grandfather cutover (harness owner-gate feature).
#
# The autonomous spec-build daemon gates un-owned (unstamped) specs by this
# instant: an un-owned spec whose plan first appeared on the default branch
# STRICTLY BEFORE the cutover is grandfather-built; one merged on/after it (or
# with an indeterminate merge time) is skipped. Owner-stamped specs matching the
# daemon owner build regardless.
#
# This repo was daemon-registered on 2026-07-02 (build-to-PR + human merge,
# issue #174). The cutover grandfathers every spec already on main at
# registration time, while newly-merged un-owned specs are gated. No
# spec_owner is committed — operator identity resolves per machine via the
# gh-login fallback (machine-scoped identity, PR #183), so a committed owner
# would wrongly apply to every checkout.
owner_gate_cutover: "2026-07-02T11:00:00Z"

# Self-host guardrails: declared version freeze (PR #262).
#
# VERSION is frozen at 0.99.19 until the operator declares 1.0 (v1.0 cutover
# program, issue #228). With the freeze declared here, the daemon's self-host
# VERSION approval gate self-satisfies when the worktree VERSION still equals
# the frozen value — no per-feature HALT + manual .pipeline/version-approval
# round-trip. A feature that ACTUALLY bumps VERSION still halts for approval.
# Read at daemon startup; restart the daemon to apply. Update or remove this
# key when cutting 1.0.
harness_self_host:
  version_freeze: "0.99.19"

# Stale-engine auto-restart (issue #256, PR #307). When the idle daemon detects
# that dist points at a newer engine than the one it is running (after a local
# rebuild — bin/install or npm run build), it respawns in place: restart marker
# → lock release → same-tmux-session respawn. Default-inert engine-side; armed
# here. Read at daemon startup; restart once to apply.
# DISABLED 2026-07-07 pending issue #400: the respawn transport stacks daemon
# generations (one stale-engine event at 13:12Z stacked four processes; a
# pre-#393 generation survived 3h alongside the owner). Re-enable once #400
# ships. While off: after merging engine changes, refresh manually —
# `bin/install --update` then `conduct-ts daemon stop && conduct-ts daemon start`.
auto_restart_on_stale_engine: false
